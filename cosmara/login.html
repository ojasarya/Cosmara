<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>COSMARA | Login - Where Every Mission Meets The Infinite</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&amp;family=Space+Grotesk:wght@500;600;700&amp;family=Geist:wght@400;500&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        :root {
            --grid-opacity: 0.07;
        }
        body {
            background-color: #10131a;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, var(--grid-opacity)) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, var(--grid-opacity)) 1px, transparent 1px);
            background-size: 32px 32px;
            color: #e1e2eb;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        .page-transition {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .glass-panel {
            backdrop-filter: blur(16px);
            background: rgba(29, 32, 38, 0.4);
            border: 1px solid rgba(166, 230, 255, 0.15);
        }
        .rocket-flare-hover:hover {
            background: linear-gradient(135deg, #ff5f1f 0%, #ffb59c 100%);
            box-shadow: 0 0 20px rgba(255, 95, 31, 0.4);
            transform: translateY(-2px);
        }
        .input-field:focus {
            outline: none;
            border-color: #a6e6ff;
            box-shadow: 0 0 0 3px rgba(166, 230, 255, 0.1);
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(166, 230, 255, 0.1);
            position: absolute;
            top: 0;
            animation: scan 8s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#e3bfb3",
                        "surface-container-low": "#191c22",
                        "tertiary-container": "#8e959c",
                        "on-background": "#e1e2eb",
                        "surface-bright": "#363940",
                        "outline-variant": "#5b4138",
                        "surface-container-lowest": "#0b0e14",
                        "secondary-container": "#14d1ff",
                        "outline": "#aa897f",
                        "on-tertiary-fixed": "#161c22",
                        "inverse-surface": "#e1e2eb",
                        "on-primary-fixed-variant": "#832700",
                        "surface-container": "#1d2026",
                        "primary": "#ffb59c",
                        "on-secondary": "#003543",
                        "on-primary-fixed": "#390c00",
                        "primary-container": "#ff5f1f",
                        "background": "#10131a",
                        "on-tertiary": "#2b3137",
                        "surface-variant": "#32353c",
                        "secondary": "#a6e6ff",
                        "secondary-fixed": "#b7eaff",
                        "error-container": "#93000a",
                        "surface": "#10131a",
                        "surface-dim": "#10131a",
                        "on-surface": "#e1e2eb",
                        "error": "#ffb4ab",
                        "inverse-on-surface": "#2e3037",
                        "on-error": "#690005",
                        "tertiary-fixed-dim": "#c1c7cf",
                        "secondary-fixed-dim": "#4cd6ff",
                        "surface-container-highest": "#32353c",
                        "tertiary": "#c1c7cf",
                        "on-error-container": "#ffdad6",
                        "surface-tint": "#ffb59c",
                        "on-primary-container": "#561700",
                        "on-tertiary-container": "#272e34",
                        "on-secondary-container": "#00566b",
                        "on-secondary-fixed-variant": "#004e60",
                        "surface-container-high": "#272a31",
                        "on-primary": "#5c1900",
                        "inverse-primary": "#ab3600",
                        "primary-fixed": "#ffdbcf",
                        "primary-fixed-dim": "#ffb59c",
                        "on-secondary-fixed": "#001f28",
                        "on-tertiary-fixed-variant": "#41474e",
                        "tertiary-fixed": "#dde3eb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit": "4px",
                        "section-gap": "64px",
                        "container-margin": "32px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "label-caps": ["JetBrains Mono"],
                        "headline-xl": ["Space Grotesk"],
                        "mono-data": ["JetBrains Mono"],
                        "body-lg": ["Geist"],
                        "headline-md": ["Space Grotesk"],
                        "body-md": ["Geist"],
                        "headline-lg": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "600" }],
                        "headline-xl": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "mono-data": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col min-h-screen page-transition">
    <!-- TopNavBar -->
    <nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-margin h-16 bg-surface/60 backdrop-blur-md border-b border-secondary/20 shadow-sm shadow-secondary/10">
        <div class="flex items-center gap-8">
            <div class="w-12 h-12 flex items-center justify-center bg-transparent">
                <img src="logo.png" alt="COSMARA Logo" class="w-full h-full object-contain">
            </div>
            <a href="index.html" class="font-headline-md text-headline-md font-bold text-primary tracking-tighter hover:text-secondary transition-colors">COSMARA</a>
            <div class="hidden md:flex items-center gap-6">
                <a class="font-body-md text-body-md text-on-surface-variant hover:text-secondary transition-colors duration-200" href="index.html">Home</a>
                <a class="font-body-md text-body-md text-on-surface-variant hover:text-secondary transition-colors duration-200" href="academy.html">Academy</a>
                <a class="font-body-md text-body-md text-on-surface-variant hover:text-secondary transition-colors duration-200" href="workshop.html">Workshop</a>
                <a class="font-body-md text-body-md text-on-surface-variant hover:text-secondary transition-colors duration-200" href="blueprints.html">Blueprints</a>
                <a class="font-body-md text-body-md text-on-surface-variant hover:text-secondary transition-colors duration-200" href="dashboard.html">Dashboard</a>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button class="bg-primary-container text-on-primary-container px-4 py-2 font-label-caps text-label-caps rounded-lg rocket-flare-hover transition-all" onclick="window.location.href='academy.html'">
                Quick-Start
            </button>
        </div>
    </nav>

    <main class="flex-grow pt-16 flex items-center justify-center px-container-margin">
        <div class="w-full max-w-md">
            <!-- Login Card -->
            <div class="glass-panel p-8 rounded-xl relative overflow-hidden">
                <div class="scanline"></div>
                
                <!-- Logo/Brand Section -->
                <div class="text-center mb-8">
                    <div class="w-16 h-16 mx-auto mb-4 flex items-center justify-center">
                        <img src="logo.png" alt="COSMARA Logo" class="w-full h-full object-contain">
                    </div>
                    <h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Welcome Back</h1>
                    <p class="font-body-md text-body-md text-on-surface-variant">Sign in to access your mission control</p>
                </div>

                <!-- Login Form -->
                <form class="space-y-6" onsubmit="handleLogin(event)">
                    <!-- Email Field -->
                    <div>
                        <label class="block font-label-caps text-label-caps text-secondary mb-2 tracking-wider">EMAIL ADDRESS</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">email</span>
                            <input 
                                type="email" 
                                class="input-field w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant/30 rounded-lg text-on-surface placeholder-on-surface-variant/50 transition-all"
                                placeholder="cadet@cosmara.space"
                                required
                            />
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label class="block font-label-caps text-label-caps text-secondary mb-2 tracking-wider">PASSWORD</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
                            <input 
                                type="password" 
                                class="input-field w-full pl-10 pr-12 py-3 bg-surface-container-low border border-outline-variant/30 rounded-lg text-on-surface placeholder-on-surface-variant/50 transition-all"
                                placeholder="••••••••"
                                required
                            />
                            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-secondary transition-colors">
                                <span class="material-symbols-outlined">visibility</span>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 rounded border-outline-variant/30 bg-surface-container-low text-secondary focus:ring-secondary focus:ring-offset-0"/>
                            <span class="font-body-md text-body-md text-on-surface-variant">Remember me</span>
                        </label>
                        <a href="#" class="font-body-md text-body-md text-secondary hover:underline transition-colors">Forgot password?</a>
                    </div>

                    <!-- Login Button -->
                    <button 
                        type="submit" 
                        class="w-full py-4 bg-primary-container text-on-primary-container font-label-caps text-label-caps rounded-lg rocket-flare-hover transition-all flex items-center justify-center gap-2"
                    >
                        <span class="material-symbols-outlined">login</span>
                        Initiate Launch Sequence
                    </button>
                </form>

                <!-- Divider -->
                <div class="flex items-center my-6">
                    <div class="flex-1 h-px bg-secondary/20"></div>
                    <span class="px-4 font-label-caps text-label-caps text-on-surface-variant text-xs">OR</span>
                    <div class="flex-1 h-px bg-secondary/20"></div>
                </div>

                <!-- Social Login Options -->
                <div class="space-y-3">
                    <button class="w-full py-3 border border-secondary/30 text-secondary font-label-caps text-label-caps rounded-lg hover:bg-secondary/10 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-sm">school</span>
                        Continue with Academy ID
                    </button>
                    <button class="w-full py-3 border border-outline-variant/30 text-on-surface-variant font-label-caps text-label-caps rounded-lg hover:bg-surface-bright/30 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-sm">badge</span>
                        Continue with SSO
                    </button>
                </div>

                <!-- Sign Up Link -->
                <p class="text-center mt-6 font-body-md text-body-md text-on-surface-variant">
                    New to COSMARA? 
                    <a href="#" class="text-secondary hover:underline font-medium transition-colors">Enlist in the Academy</a>
                </p>
            </div>

            <!-- Status Footer -->
            <div class="mt-6 text-center">
                <div class="inline-flex items-center gap-2 px-4 py-2 glass-panel rounded-full">
                    <div class="w-2 h-2 bg-secondary rounded-full animate-pulse"></div>
                    <span class="font-mono-data text-mono-data text-secondary text-xs">SYSTEM STATUS: OPERATIONAL</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full py-gutter px-container-margin flex flex-col md:flex-row justify-between items-center bg-surface-container-lowest border-t border-outline-variant/30">
        <div class="flex flex-col gap-2 mb-6 md:mb-0">
            <span class="font-label-caps text-label-caps text-on-surface-variant uppercase">COSMARA Systems</span>
            <span class="font-mono-data text-mono-data text-tertiary">Status: All Systems Go</span>
        </div>
        <div class="flex gap-8 mb-6 md:mb-0">
            <a class="font-mono-data text-mono-data text-on-surface-variant hover:text-primary underline opacity-80 hover:opacity-100 transition-opacity" href="#">Documentation</a>
            <a class="font-mono-data text-mono-data text-on-surface-variant hover:text-primary underline opacity-80 hover:opacity-100 transition-opacity" href="#">Safety Protocols</a>
            <a class="font-mono-data text-mono-data text-on-surface-variant hover:text-primary underline opacity-80 hover:opacity-100 transition-opacity" href="#">Ground Control</a>
        </div>
    </footer>

    <script>
        // Admin credentials
        const ADMIN_CREDENTIALS = {
            username: 'admin@cosmara.space',
            password: 'cosmara2024'
        };

        // User storage (simulated database)
        let users = JSON.parse(localStorage.getItem('cosmara_users')) || [
            { id: 1, username: 'cadet1', email: 'cadet1@cosmara.space', password: 'cadet123', status: 'approved', role: 'cadet', createdAt: '2024-01-15' },
            { id: 2, username: 'engineer2', email: 'engineer2@cosmara.space', password: 'engineer123', status: 'pending', role: 'engineer', createdAt: '2024-06-10' },
            { id: 3, username: 'commander3', email: 'commander3@cosmara.space', password: 'commander123', status: 'approved', role: 'commander', createdAt: '2024-05-20' }
        ];

        function handleLogin(event) {
            event.preventDefault();
            const email = event.target.querySelector('input[type="email"]').value;
            const password = event.target.querySelector('input[type="password"]').value;

            // Check for admin login
            if (email === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                localStorage.setItem('currentUser', JSON.stringify({ username: 'admin', role: 'admin' }));
                window.location.href = 'admin.html';
                return;
            }

            // Check for regular user login
            const user = users.find(u => u.email === email && u.password === password);
            if (user) {
                if (user.status === 'approved') {
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    window.location.href = 'dashboard.html';
                } else {
                    showNotification('Your account is pending approval from admin.');
                }
            } else {
                showNotification('Invalid credentials. Please try again.');
            }
        }

        function showNotification(message) {
            // Create notification element
            const notification = document.createElement('div');
            notification.className = 'fixed top-20 right-4 bg-secondary text-on-secondary px-6 py-3 rounded-lg shadow-lg z-50 font-label-caps text-label-caps';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Smooth page transitions
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('page-transition');
        });
    </script>
</body>
</html>
